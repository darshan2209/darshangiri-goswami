services:
  - type: web
    name: darshan-ai-twin
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_twin_server:app --worker-class gthread --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this secret in the Render dashboard, never in the repo
      - key: PYTHON_VERSION
        value: "3.12.6"
